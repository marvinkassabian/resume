name: Release and Publish GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release/publish (for example v1.2.3)"
        required: true
        type: string
      strict_sections:
        description: "Enable strict validation during PDF build"
        required: false
        default: true
        type: boolean
      release_assets_only:
        description: "Publish GitHub Pages from an existing release's PDF assets only (skip release build)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build and Publish GitHub Release
    permissions:
      contents: write
    uses: marvinkassabian/latex-document-ops/.github/workflows/release.yml@main
    with:
      source_repository: ${{ github.repository }}
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      release_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      build_command: make build
      artifact_path: build/
      artifact_name: kassabian-resume-pdfs
      strict_build: ${{ github.event_name == 'push' || inputs.strict_sections }}
      clean_command: make clean-aux
      enable_github_release: ${{ github.event_name == 'push' || inputs.release_assets_only != true }}
      generate_release_notes: true
      enable_version_validation: true

  build-pages-site:
    name: Build GitHub Pages Site
    if: ${{ needs.release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.release_assets_only == true) }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set Up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download PDF Artifacts
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.release_assets_only == true) }}
        uses: actions/download-artifact@v4
        with:
          name: kassabian-resume-pdfs
          path: build

      - name: Download Release PDF Assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_assets_only == true }}
        uses: marvinkassabian/latex-document-ops/.github/actions/download-release-pdfs@main
        with:
          release_tag: ${{ inputs.release_tag }}
          repository: ${{ github.repository }}

      - name: Build GitHub Pages Site
        uses: marvinkassabian/latex-document-ops/.github/actions/build-pages-site@main
        with:
          artifact_path: build/
          page_title: "Kassabian Resume"
          page_description: "Generated from the latest release."

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-github-pages:
    name: Deploy GitHub Pages
    needs: build-pages-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
