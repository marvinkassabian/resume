name: Build LaTeX

on:
  push:
  workflow_dispatch:
    inputs:
      strict_sections:
        description: "Fail workflow if standalone section/frontmatter PDFs fail"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: build-latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-latex:
    permissions:
      contents: read
    uses: marvinkassabian/latex-document-ops/.github/workflows/build.yml@main
    with:
      source_repository: ${{ github.repository }}
      source_ref: ${{ github.sha }}
      build_command: make build
      artifact_path: build/
      artifact_name: kassabian-resume-pdfs
      strict_build: ${{ github.event_name == 'push' || inputs.strict_sections }}
      clean_command: make clean-aux
