name: Cleanup Artifacts

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      age:
        description: "Delete artifacts older than this age"
        required: false
        default: "3 days"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cleanup-artifacts
  cancel-in-progress: false

jobs:
  cleanup-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write

    steps:
      - name: Remove old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: ${{ github.event_name == 'workflow_dispatch' && inputs.age || '3 days' }}
